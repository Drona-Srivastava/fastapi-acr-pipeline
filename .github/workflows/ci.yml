name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test, Build and Verify Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv --python 3.12

      - name: Install dependencies
        run: uv pip install -r requirements-dev.txt

      - name: Run tests
        run: uv run pytest -v

      - name: Build Docker image
        run: |
          docker build \
            -t url-shortener:${{ github.sha }} \
            .
    
      - name: Tag Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          docker tag \
            url-shortener:${{ github.sha }} \
            url-shortener:build-${{ github.run_number }}

          docker tag \
            url-shortener:${{ github.sha }} \
            url-shortener:sha-${SHORT_SHA}

          echo "Created image tags:"
          echo "url-shortener:build-${{ github.run_number }}"
          echo "url-shortener:sha-${SHORT_SHA}"

          docker image ls url-shortener
      
      - name: Run container smoke tests
        env:
          IMAGE_NAME: url-shortener:${{ github.sha }}
        run: ./scripts/container-smoke-test.sh